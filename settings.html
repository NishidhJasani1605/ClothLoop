<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Settings</title>
  <link rel="stylesheet" href="settings.css"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet"/>
</head>
<body>
  <!-- Header -->
  <header class="main-header">
    <div class="header-left">
      <div class="logo">
        <img src="LOGO.webp" alt="APPLICATION logo" />
        <div class="brand-name">
        </div>
      </div>
    </div>
    <div class="header-right">
      <div class="account-info">
        <div class="notifications">
          <i class="fas fa-bell"></i>
          <span class="notification-badge">3</span>
        </div>
        <div class="user-profile">
          <img src="Shop_logo.png" alt="User Shop logo" />
          <div class="user-details">
            <h4 id="username-display">Loading...</h4>
            <p>Seller Account</p>
          </div>
          <i class="fas fa-chevron-down"></i>
          <div class="dropdown-menu">
            <a href="#"><i class="fas fa-user"></i> Profile</a>
            <a href="#" data-section="settings"><i class="fas fa-cog"></i> Settings</a>
            <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Log Out</a>
          </div>
        </div>
      </div>
    </div>
  </header>

  <!-- Settings Section -->
  <div class="main-content">
    <h1>Settings</h1>
    <div class="form-group">
      <label for="email">Email:</label>
      <input id="email" type="text" placeholder="Loading..."/>
    </div>
    <div class="form-group">
      <label for="phone">Phone Number:</label>
      <input id="phone" type="text" placeholder="Loading..."/>
    </div>
    <div class="form-group">
      <label for="password">Password:</label>
      <input id="password" type="password" value="********"/>
    </div>
    <div class="form-group">
      <label for="confirm-password">Confirm Password:</label>
      <input id="confirm-password" type="password" value="********"/>
    </div>
    <div class="form-group">
      <label for="profile-picture">Profile Picture:</label>
      <input id="profile-picture" type="file"/>
    </div>
    <div class="form-group">
      <label for="bio">Bio:</label>
      <textarea id="bio" placeholder="Tell us about yourself..."></textarea>
    </div>
    <div class="form-group button-group">
      <button type="button" class="save-btn" onclick="saveSettings()">Save Changes</button>
      <button type="button" class="back-btn" onclick="window.location.href='Seller_Dashboard.html'">
        <i class="fas fa-arrow-left"></i> Back
      </button>
    </div>
  </div>

  <script>
    // Check if user is logged in
    document.addEventListener('DOMContentLoaded', function() {
      const userInfo = JSON.parse(localStorage.getItem('user_info'));
      if (!userInfo) {
        window.location.href = 'login.html';
        return;
      }

      // Display username
      document.getElementById('username-display').textContent = userInfo.username;

      // Fetch user details
      fetch('get_user_details.php', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          user_id: userInfo.user_id
        })
      })
      .then(response => response.json())
      .then(data => {
        if (data.success) {
          // Update user details in the settings form
          document.getElementById('email').value = data.email || '';
          document.getElementById('phone').value = data.phone || '';
        }
      })
      .catch(error => console.error('Error:', error));
    });

    // Save settings function
    async function saveSettings() {
      const userInfo = JSON.parse(localStorage.getItem('user_info'));
      if (!userInfo) {
        window.location.href = 'login.html';
        return;
      }

      const email = document.getElementById('email').value;
      const phone = document.getElementById('phone').value;
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirm-password').value;
      const bio = document.getElementById('bio').value;

      // Basic validation
      if (password !== confirmPassword) {
        alert('Passwords do not match!');
        return;
      }

      try {
        const response = await fetch('update_settings.php', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            user_id: userInfo.user_id,
            email: email,
            phone: phone,
            password: password,
            bio: bio
          })
        });

        const data = await response.json();
        if (data.success) {
          alert('Settings updated successfully!');
        } else {
          alert(data.message || 'Error updating settings');
        }
      } catch (error) {
        console.error('Error:', error);
        alert('An error occurred while saving settings');
      }
    }

    // Handle profile picture upload
    document.getElementById('profile-picture').addEventListener('change', async function(e) {
      const userInfo = JSON.parse(localStorage.getItem('user_info'));
      if (!userInfo) {
        window.location.href = 'login.html';
        return;
      }

      const file = e.target.files[0];
      if (!file) return;

      const formData = new FormData();
      formData.append('profile_picture', file);
      formData.append('user_id', userInfo.user_id);

      try {
        const response = await fetch('upload_profile_picture.php', {
          method: 'POST',
          body: formData
        });

        const data = await response.json();
        if (data.success) {
          alert('Profile picture updated successfully!');
        } else {
          alert(data.message || 'Error updating profile picture');
        }
      } catch (error) {
        console.error('Error:', error);
        alert('An error occurred while uploading profile picture');
      }
    });

    // Logout function
    function logout() {
      localStorage.removeItem('user_info');
      window.location.href = 'login.html';
    }
  </script>
</body>
</html>
