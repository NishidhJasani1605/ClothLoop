<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="signup" href="signup.html">
    <!-- <link rel="login-form" href="login.js"> -->
    <link rel="stylesheet" href="login.css">
    <title>Login - ClothLoop</title>
</head>
<body>

    <div class="container">
        <h1>Login</h1>
        <form id="login-form">
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" required><br><br>
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required><br><br>
            <div class="button-container">
                <input type="submit" value="Login">
            </div>
        </form>
        
        <!-- Updated Google Sign-In button -->
        <div class="separator">
            <div class="line"></div>
            <p>or</p>
            <div class="line"></div>
        </div>
        
        <button type="button" class="google-btn" id="googleSignIn">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="Google logo">
            Continue with Google
        </button>
        <div style="text-align: center;">
            <p>Don't have an account? <a href="signup.html">Sign up</a></p>
        </div>
    </div>
      
     <script>
     document.getElementById('login-form').addEventListener('submit', async function(e) {
         e.preventDefault();
         
         const username = document.getElementById('username').value;
         const password = document.getElementById('password').value;
         
         try {
             const response = await fetch('process_login.php', {
                 method: 'POST',
                 headers: {
                     'Content-Type': 'application/json'
                 },
                 body: JSON.stringify({
                     username: username,
                     password: password
                 })
             });
             
             const data = await response.json();
             
             if (data.success) {
                 // Store user info in localStorage for dashboard
                 localStorage.setItem('user_info', JSON.stringify({
                     username: data.username,
                     user_type: data.user_type,
                     user_id: data.user_id
                 }));

                 // Redirect based on user type
                 if (data.user_type === 'seller') {
                     window.location.href = 'Seller_Dashboard.html';
                 } else if (data.user_type === 'buyer') {
                     window.location.href = 'Buyer_Dashboard.html';
                 } else {
                     alert('Invalid user type');
                     localStorage.removeItem('user_info');
                 }
             } else {
                 alert(data.message || 'Login failed');
             }
         } catch (error) {
             console.error('Error:', error);
             alert('An error occurred during login');
         }
     });
     </script>
    
</body>
</html>
